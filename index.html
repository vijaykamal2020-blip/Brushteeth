<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3 Minute Kids Brush Coach</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", Arial, sans-serif;
      background: linear-gradient(135deg, #7ee8fa, #f9b5d0, #fff176);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      color: #263238;
    }

    .app {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,.98);
      border: 5px solid #fff;
      border-radius: 32px;
      padding: 14px;
      box-shadow: 0 18px 42px rgba(0,0,0,.2);
      text-align: center;
    }

    .hero {
      font-size: 56px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    h1 {
      margin: 2px 0 8px;
      font-size: 27px;
      color: #ff4081;
      text-shadow: 1px 1px 0 #fff176;
    }

    .timer-card {
      background: linear-gradient(135deg, #fff176, #ffcc80);
      border: 4px dashed #ff7043;
      border-radius: 25px;
      padding: 10px;
      margin-bottom: 9px;
    }

    .timer {
      font-size: 52px;
      color: #2e7d32;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .emoji-line {
      font-size: 44px;
      min-height: 54px;
    }

    .stage {
      background: linear-gradient(135deg, #ffffff, #e1f5fe);
      border: 5px solid #81d4fa;
      border-radius: 28px;
      min-height: 340px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .view {
      display: none;
      width: 100%;
      animation: pop .3s ease;
    }

    .view.show { display: block; }

    @keyframes pop {
      from { transform: scale(.86); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .big-mouth {
      width: 330px;
      height: 250px;
      margin: 0 auto;
      background: #ff8a80;
      border: 8px solid #d81b60;
      border-radius: 52% 52% 45% 45%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -12px 0 rgba(183,28,28,.15);
    }

    .open-mouth {
      width: 330px;
      height: 270px;
      margin: 0 auto;
      background: #ffab91;
      border: 8px solid #d84315;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -12px 0 rgba(183,28,28,.12);
    }

    .top-badge, .bottom-badge, .side-badge {
      position: absolute;
      background: #fff176;
      color: #6a1b9a;
      font-weight: bold;
      font-size: 28px;
      border-radius: 18px;
      padding: 2px 14px;
      border: 4px solid #ff9800;
      z-index: 20;
    }

    .top-badge { top: 5px; left: 50%; transform: translateX(-50%); }
    .bottom-badge { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .side-badge.left { left: 5px; top: 46%; transform: translateY(-50%); font-size: 22px; }
    .side-badge.right { right: 5px; top: 46%; transform: translateY(-50%); font-size: 22px; }

    .teeth-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      position: absolute;
      left: 0;
      right: 0;
      z-index: 8;
    }

    .top-row { top: 56px; }
    .bottom-row { bottom: 56px; }

    .tooth {
      width: 30px;
      height: 40px;
      background: #fff;
      border: 3px solid #90a4ae;
      border-radius: 8px 8px 15px 15px;
      transition: .25s;
    }

    .molar {
      width: 37px;
      border-radius: 14px;
    }

    .dim { opacity: .35; }
    .active {
      background: #fff176 !important;
      border-color: #ff9800 !important;
      box-shadow: 0 0 18px #ffca28;
      transform: scale(1.18);
      opacity: 1 !important;
    }

    .brush {
      position: absolute;
      font-size: 50px;
      z-index: 30;
      animation: scrub .65s infinite alternate;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,.2));
    }

    .brush.top { top: 90px; left: 92px; }
    .brush.bottom { bottom: 86px; left: 92px; }
    .brush.left { top: 105px; left: 35px; }
    .brush.right { top: 105px; right: 35px; transform: rotate(180deg); }

    @keyframes scrub {
      from { transform: translateX(-36px) rotate(-15deg); }
      to { transform: translateX(48px) rotate(13deg); }
    }

    .tongue {
      position: absolute;
      left: 90px;
      bottom: 32px;
      width: 135px;
      height: 88px;
      background: #ef5350;
      border-radius: 50%;
      opacity: .9;
      z-index: 2;
    }

    .inside-arc {
      position: absolute;
      left: 45px;
      right: 45px;
      display: flex;
      justify-content: center;
      gap: 5px;
      z-index: 8;
    }

    .inside-arc.top { top: 22px; }
    .inside-arc.bottom { bottom: 18px; }

    .inside-tooth {
      width: 28px;
      height: 37px;
      background: white;
      border: 3px solid #90a4ae;
      border-radius: 8px;
      transition: .25s;
    }

    .side-teeth {
      position: absolute;
      top: 84px;
      display: grid;
      gap: 5px;
      z-index: 8;
    }

    .side-teeth.left { left: 24px; }
    .side-teeth.right { right: 24px; }

    .side-tooth {
      width: 37px;
      height: 30px;
      background: white;
      border: 3px solid #90a4ae;
      border-radius: 12px;
      transition: .25s;
    }

    .touch-circle {
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: 8px solid #29b6f6;
      background: rgba(255,241,118,.35);
      z-index: 15;
      animation: tapPulse .7s infinite alternate;
      pointer-events: none;
    }

    .touch-top { top: 58px; left: 118px; }
    .touch-bottom { bottom: 58px; left: 118px; }
    .touch-left { top: 88px; left: 15px; }
    .touch-right { top: 88px; right: 15px; }

    @keyframes tapPulse {
      from { transform: scale(.86); opacity: .65; }
      to { transform: scale(1.1); opacity: 1; }
    }

    .chew-map {
      width: 335px;
      margin: 0 auto;
      background: #e8f5e9;
      border: 7px solid #43a047;
      border-radius: 32px;
      padding: 10px;
      position: relative;
    }

    .face-icon {
      font-size: 50px;
      margin-bottom: 3px;
    }

    .chew-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .corner {
      min-height: 118px;
      background: white;
      border: 5px dashed #ff9800;
      border-radius: 23px;
      padding: 8px;
      position: relative;
      opacity: .35;
      transition: .25s;
    }

    .corner.active-corner {
      opacity: 1;
      background: #fff8e1;
      box-shadow: 0 0 18px #ffb74d;
      transform: scale(1.06);
    }

    .corner-symbol {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .flat-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .flat {
      width: 35px;
      height: 36px;
      border: 5px solid #ff9800;
      border-radius: 12px;
      background: #fffde7;
      box-shadow: inset 0 -5px 0 #ffe0b2;
    }

    .active-corner .flat {
      background: #fff176;
      box-shadow: 0 0 14px #ffca28;
    }

    .chew-brush {
      position: absolute;
      bottom: 2px;
      left: 32%;
      font-size: 42px;
      animation: chewScrub .55s infinite alternate;
      z-index: 9;
    }

    @keyframes chewScrub {
      from { transform: translateX(-15px) rotate(-15deg); }
      to { transform: translateX(27px) rotate(15deg); }
    }

    .caption {
      background: #e1f5fe;
      color: #01579b;
      border-radius: 20px;
      padding: 10px;
      margin: 9px 0;
      min-height: 54px;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-wrap {
      width: 100%;
      height: 22px;
      background: #eceff1;
      border-radius: 999px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.15);
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #66bb6a, #29b6f6, #ab47bc, #ff7043);
      transition: width .5s linear;
    }

    .buttons {
      margin-top: 11px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 13px 8px;
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,.18);
      cursor: pointer;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .start { background: #43a047; }
    .pause { background: #fb8c00; }
    .reset { background: #e53935; }
    .voice { background: #5e35b1; }

    .note {
      margin-top: 8px;
      font-size: 13px;
      color: #546e7a;
      font-weight: bold;
    }

    .celebrate {
      display: none;
      margin-top: 12px;
      background: #dcedc8;
      color: #33691e;
      padding: 14px;
      border-radius: 22px;
      font-size: 24px;
      font-weight: bold;
    }

    @media (max-width: 390px) {
      .timer { font-size: 44px; }
      h1 { font-size: 23px; }
      .stage { min-height: 325px; }
      .big-mouth, .open-mouth { width: 295px; height: 245px; }
      .big-mouth { height: 220px; }
      .chew-map { width: 295px; }
      .tooth { width: 24px; height: 34px; }
      .molar { width: 29px; }
      .inside-tooth { width: 23px; height: 32px; }
      .side-tooth { width: 31px; height: 26px; }
      .flat { width: 29px; height: 31px; }
      .caption { font-size: 21px; }
      .top-badge, .bottom-badge { font-size: 24px; }
      .side-badge.left, .side-badge.right { font-size: 18px; }
      .brush { font-size: 42px; }
      .touch-circle { width: 78px; height: 78px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">🪥😄🦷</div>
    <h1>3-Minute Brush Buddy</h1>

    <div class="timer-card">
      <div id="timer" class="timer">03:00</div>
      <div id="emojiLine" class="emoji-line">👆🦷✨</div>
    </div>

    <div class="stage">
      <div id="outsideTop" class="view">
        <div class="big-mouth">
          <div class="top-badge">TOP</div>
          <div class="brush top">🪥</div>
          <div class="teeth-row top-row">
            <div class="tooth molar topOutside"></div><div class="tooth molar topOutside"></div>
            <div class="tooth topOutside"></div><div class="tooth topOutside"></div>
            <div class="tooth molar topOutside"></div><div class="tooth molar topOutside"></div>
          </div>
          <div class="teeth-row bottom-row">
            <div class="tooth molar dim"></div><div class="tooth molar dim"></div>
            <div class="tooth dim"></div><div class="tooth dim"></div>
            <div class="tooth molar dim"></div><div class="tooth molar dim"></div>
          </div>
        </div>
      </div>

      <div id="outsideBottom" class="view">
        <div class="big-mouth">
          <div class="teeth-row top-row">
            <div class="tooth molar dim"></div><div class="tooth molar dim"></div>
            <div class="tooth dim"></div><div class="tooth dim"></div>
            <div class="tooth molar dim"></div><div class="tooth molar dim"></div>
          </div>
          <div class="teeth-row bottom-row">
            <div class="tooth molar bottomOutside"></div><div class="tooth molar bottomOutside"></div>
            <div class="tooth bottomOutside"></div><div class="tooth bottomOutside"></div>
            <div class="tooth molar bottomOutside"></div><div class="tooth molar bottomOutside"></div>
          </div>
          <div class="brush bottom">🪥</div>
          <div class="bottom-badge">BOTTOM</div>
        </div>
      </div>

      <div id="insideTop" class="view">
        <div class="open-mouth">
          <div class="touch-circle touch-top"></div>
          <div class="inside-arc top">
            <div class="inside-tooth topInside"></div><div class="inside-tooth topInside"></div>
            <div class="inside-tooth topInside"></div><div class="inside-tooth topInside"></div>
            <div class="inside-tooth topInside"></div>
          </div>
          <div class="brush top">🪥</div>
          <div class="tongue"></div>
          <div class="inside-arc bottom">
            <div class="inside-tooth dim"></div><div class="inside-tooth dim"></div>
            <div class="inside-tooth dim"></div><div class="inside-tooth dim"></div>
            <div class="inside-tooth dim"></div>
          </div>
        </div>
      </div>

      <div id="insideBottom" class="view">
        <div class="open-mouth">
          <div class="inside-arc top">
            <div class="inside-tooth dim"></div><div class="inside-tooth dim"></div>
            <div class="inside-tooth dim"></div><div class="inside-tooth dim"></div>
            <div class="inside-tooth dim"></div>
          </div>
          <div class="tongue"></div>
          <div class="touch-circle touch-bottom"></div>
          <div class="brush bottom">🪥</div>
          <div class="inside-arc bottom">
            <div class="inside-tooth bottomInside"></div><div class="inside-tooth bottomInside"></div>
            <div class="inside-tooth bottomInside"></div><div class="inside-tooth bottomInside"></div>
            <div class="inside-tooth bottomInside"></div>
          </div>
        </div>
      </div>

      <div id="insideLeft" class="view">
        <div class="open-mouth">
          <div class="side-badge left">LEFT</div>
          <div class="touch-circle touch-left"></div>
          <div class="side-teeth left">
            <div class="side-tooth leftInside"></div>
            <div class="side-tooth leftInside"></div>
            <div class="side-tooth leftInside"></div>
          </div>
          <div class="brush left">🪥</div>
          <div class="tongue"></div>
          <div class="side-teeth right">
            <div class="side-tooth dim"></div>
            <div class="side-tooth dim"></div>
            <div class="side-tooth dim"></div>
          </div>
        </div>
      </div>

      <div id="insideRight" class="view">
        <div class="open-mouth">
          <div class="side-badge right">RIGHT</div>
          <div class="touch-circle touch-right"></div>
          <div class="side-teeth left">
            <div class="side-tooth dim"></div>
            <div class="side-tooth dim"></div>
            <div class="side-tooth dim"></div>
          </div>
          <div class="tongue"></div>
          <div class="brush right">🪥</div>
          <div class="side-teeth right">
            <div class="side-tooth rightInside"></div>
            <div class="side-tooth rightInside"></div>
            <div class="side-tooth rightInside"></div>
          </div>
        </div>
      </div>

      <div id="chewView" class="view">
        <div class="face-icon">😬</div>
        <div class="chew-map">
          <div class="chew-grid">
            <div id="top-left" class="corner">
              <div class="corner-symbol">↖️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="top-right" class="corner">
              <div class="corner-symbol">↗️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="bottom-left" class="corner">
              <div class="corner-symbol">↙️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="bottom-right" class="corner">
              <div class="corner-symbol">↘️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="caption" class="caption">Tap ▶ Start</div>

    <div class="progress-wrap">
      <div id="progress" class="progress"></div>
    </div>

    <div class="buttons">
      <button class="start" onclick="startTimer()">▶ Start</button>
      <button class="pause" onclick="pauseTimer()">⏸ Pause</button>
      <button class="reset" onclick="resetTimer()">↺ Reset</button>
      <button class="voice" onclick="testVoice()">🔊 Voice</button>
    </div>

    <div class="note">Big pictures + touch circle + glowing teeth guide the child.</div>

    <div id="celebrate" class="celebrate">🎉 😁 ⭐ 🦷 ⭐ 😁 🎉</div>
  </div>

  <script>
    const totalTime = 180;
    let timeLeft = totalTime;
    let interval = null;
    let running = false;
    let currentSpeechIndex = -1;

    const timerEl = document.getElementById("timer");
    const emojiLineEl = document.getElementById("emojiLine");
    const captionEl = document.getElementById("caption");
    const progressEl = document.getElementById("progress");
    const celebrateEl = document.getElementById("celebrate");

    const views = {
      outsideTop: document.getElementById("outsideTop"),
      outsideBottom: document.getElementById("outsideBottom"),
      insideTop: document.getElementById("insideTop"),
      insideBottom: document.getElementById("insideBottom"),

      insideRight: document.getElementById("insideRight"),

      { at:156, view:"outsideBottom", glow:".bottomOutside", emoji:"👇🦷✨", caption:"👇🦷", text:"Now bottom teeth. Brush the yellow bottom teeth gently." },
      { at:150, view:"outsideBottom", glow:".bottomOutside", emoji:"🐢👇", caption:"🐢 slow", text:"Slow like a turtle. Small circles, small circles." },
      { at:144, view:"outsideBottom", glow:".bottomOutside", emoji:"⬅️➡️", caption:"⬅️🪥➡️", text:"Bottom teeth left, middle, right. The brush is doing a funny dance." },
      { at:138, view:"outsideBottom", glow:".bottomOutside", emoji:"😄👇", caption:"😁✨", text:"Great job. Bottom teeth are smiling. Sugar bugs are packing bags." },

      { at:132, view:"insideTop", glow:".topInside", emoji:"🦁👆", caption:"🦁👆", text:"Open big like a lion. Brush behind the top teeth. Follow the blue touch circle." },

      { at:84, view:"insideLeft", glow:".leftInside", emoji:"👈⭐", caption:"⭐👈", text:"Left inside teeth are getting clean. Bye bye crumb monsters." },

      { at:78, view:"insideRight", glow:".rightInside", emoji:"👉🦷", caption:"👉🦷", text:"Now inside right side teeth. Brush the other side wall." },
      { at:72, view:"insideRight", glow:".rightInside", emoji:"👉🪥", caption:"👉✨", text:"Right side, tiny circles. Toothbrush says, excuse me crumbs." },

      { at:36, view:"chew", corner:"bottom-left", emoji:"↙️🦷", caption:"↙️🪥", text:"Bottom left corner. These teeth chew yummy food. Clean the flat tops." },
      { at:30, view:"chew", corner:"bottom-left", emoji:"↙️🐸", caption:"↙️🐸", text:"Bottom left is hopping clean like a funny frog. Ribbit scrub scrub." },
      { at:24, view:"chew", corner:"bottom-right", emoji:"↘️🦷", caption:"↘️🪥", text:"Bottom right corner. Last chewing corner. You are a brushing champion." },
      { at:18, view:"chew", corner:"bottom-right", emoji:"↘️⭐", caption:"↘️⭐", text:"Bottom right again. Scrub, scrub, sparkle. Almost done." },
      { at:12, view:"chew", corner:"bottom-right", emoji:"👅✨", caption:"👅✨", text:"Gently brush your tongue. Soft soft soft. No superhero pushing." },
      { at:6, view:"chew", corner:"bottom-right", emoji:"🎉😁", caption:"🎉😁", text:"Final sparkle countdown. Three, two, one, big shiny smile." }
    ];

    function loadVoices() {
      if ("speechSynthesis" in window) window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("Voice is not supported in this browser.");
        return;
      }

      window.speechSynthesis.cancel();

      const voices = window.speechSynthesis.getVoices();
      const voice =
        voices.find(v => v.name.toLowerCase().includes("samantha")) ||
        voices.find(v => v.name.toLowerCase().includes("google us english")) ||
        voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en-us")) ||
        voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) ||
        voices[0];

      const msg = new SpeechSynthesisUtterance(text);
      if (voice) msg.voice = voice;
      msg.lang = "en-US";
      msg.rate = 0.78;
      msg.pitch = 1.25;
      msg.volume = 1;
      window.speechSynthesis.speak(msg);
    }

    function testVoice() {
      loadVoices();
      speak("Hi brushing buddy. I will talk for the whole three minutes. Follow the glowing teeth.");
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
    }

    function getCurrentStep() {
      let step = speechPlan[0];
      let index = 0;
      for (let i = 0; i < speechPlan.length; i++) {
        if (timeLeft <= speechPlan[i].at) {
          step = speechPlan[i];
          index = i;
        }
      }
      return { step, index };
    }

    function clearVisuals() {
      Object.values(views).forEach(v => v.classList.remove("show"));
      document.querySelectorAll(".active").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".active-corner").forEach(el => el.classList.remove("active-corner"));
    }

    function showStep(step) {
      clearVisuals();

      views[step.view].classList.add("show");

      if (step.glow) {
        document.querySelectorAll(step.glow).forEach(el => el.classList.add("active"));
      }

      if (step.corner) {
        const c = document.getElementById(step.corner);
        if (c) c.classList.add("active-corner");
      }

      emojiLineEl.textContent = step.emoji;
      captionEl.textContent = step.caption;
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(timeLeft);
      progressEl.style.width = ((totalTime - timeLeft) / totalTime * 100) + "%";

      const { step, index } = getCurrentStep();
      showStep(step);

      if (running && index !== currentSpeechIndex) {
        currentSpeechIndex = index;
        speak(step.text);
      }
    }

    function startTimer() {
      loadVoices();

      if (running) return;

      running = true;
      celebrateEl.style.display = "none";

      const { step, index } = getCurrentStep();
      currentSpeechIndex = index;
      showStep(step);
      speak(step.text);

      interval = setInterval(() => {
        timeLeft--;
        updateDisplay();

        if (timeLeft <= 0) finishTimer();
      }, 1000);
    }

    function pauseTimer() {
      running = false;
      clearInterval(interval);
      speak("Paused. Toothbrush is taking a tiny nap.");
    }

    function resetTimer() {
      running = false;
      clearInterval(interval);
      timeLeft = totalTime;
      currentSpeechIndex = -1;
      celebrateEl.style.display = "none";
      progressEl.style.width = "0%";
      timerEl.textContent = "03:00";
      emojiLineEl.textContent = "👆🦷✨";
      captionEl.textContent = "Tap ▶ Start";
      clearVisuals();
      views.outsideTop.classList.add("show");
      document.querySelectorAll(".topOutside").forEach(el => el.classList.add("active"));

      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function finishTimer() {
      running = false;
      clearInterval(interval);
      timeLeft = 0;
      progressEl.style.width = "100%";
      timerEl.textContent = "00:00";
      emojiLineEl.textContent = "🎉😁";
      captionEl.textContent = "🎉⭐😁⭐🎉";
      celebrateEl.style.display = "block";
      speak("All done. Great brushing. You defeated the sugar bugs. Big shiny smile.");
    }

    resetTimer();
  </script>
</body>
</html>
