<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picture Brush Coach</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", Arial, sans-serif;
      background: linear-gradient(135deg, #7ee8fa, #f9b5d0, #fff176);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      color: #263238;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,.97);
      border-radius: 32px;
      padding: 14px;
      border: 5px solid white;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      text-align: center;
    }

    .hero {
      font-size: 58px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    h1 {
      margin: 3px 0 8px;
      font-size: 28px;
      color: #ff4081;
      text-shadow: 1px 1px 0 #fff176;
    }

    .timer-card {
      background: linear-gradient(135deg, #fff176, #ffcc80);
      border: 4px dashed #ff7043;
      border-radius: 25px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .timer {
      font-size: 52px;
      color: #2e7d32;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .big-emoji {
      font-size: 46px;
      min-height: 55px;
    }

    .stage {
      background: linear-gradient(135deg, #ffffff, #e1f5fe);
      border: 5px solid #81d4fa;
      border-radius: 28px;
      padding: 10px;
      min-height: 315px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .view {
      display: none;
      width: 100%;
      animation: pop .3s ease;
    }

    .view.show {
      display: block;
    }

    @keyframes pop {
      from { transform: scale(.86); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .symbol-row {
      font-size: 42px;
      margin-bottom: 6px;
      min-height: 50px;
    }

    .outside-mouth {
      width: 315px;
      height: 210px;
      margin: 0 auto;
      background: #ff8a80;
      border: 7px solid #d81b60;
      border-radius: 52% 52% 45% 45%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -10px 0 rgba(183,28,28,.15);
    }

    .top-badge,
    .bottom-badge {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: #fff176;
      color: #6a1b9a;
      font-weight: bold;
      font-size: 31px;
      border-radius: 18px;
      padding: 2px 16px;
      border: 4px solid #ff9800;
      z-index: 5;
    }

    .top-badge { top: 4px; }
    .bottom-badge { bottom: 4px; }

    .teeth-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      position: absolute;
      left: 0;
      right: 0;
    }

    .top-row { top: 48px; }
    .bottom-row { bottom: 48px; }

    .tooth {
      width: 29px;
      height: 39px;
      background: white;
      border: 3px solid #90a4ae;
      border-radius: 8px 8px 15px 15px;
      transition: .25s;
    }

    .molar {
      width: 36px;
      border-radius: 14px;
    }

    .active-tooth {
      background: #fff176;
      border-color: #ff9800;
      transform: scale(1.2);
      box-shadow: 0 0 18px #ffca28;
    }

    .dim-tooth {
      opacity: .45;
    }

    .brush {
      position: absolute;
      font-size: 48px;
      z-index: 10;
      animation: scrub .7s infinite alternate;
    }

    .top-brush { top: 75px; left: 92px; }
    .bottom-brush { bottom: 76px; left: 92px; }

    @keyframes scrub {
      from { transform: translateX(-42px) rotate(-14deg); }
      to { transform: translateX(55px) rotate(12deg); }
    }

    .inside-mouth {
      width: 315px;
      height: 240px;
      margin: 0 auto;
      background: #ffab91;
      border: 7px solid #d84315;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .tongue {
      position: absolute;
      left: 88px;
      bottom: 28px;
      width: 130px;
      height: 85px;
      background: #ef5350;
      border-radius: 50%;
      opacity: .9;
    }

    .inside-arc {
      display: flex;
      justify-content: center;
      gap: 5px;
      position: absolute;
      left: 45px;
      right: 45px;
    }

    .inside-arc.top { top: 18px; }
    .inside-arc.bottom { bottom: 16px; }

    .inside-tooth {
      width: 27px;
      height: 36px;
      background: white;
      border: 3px solid #90a4ae;
      border-radius: 8px;
    }

    .inside-tooth.glow {
      background: #fff176;
      border-color: #ff9800;
      box-shadow: 0 0 16px #ffca28;
      transform: scale(1.1);
    }

    .inside-arrow {
      position: absolute;
      left: 64px;
      right: 64px;
      height: 48px;
      border: 7px dashed #29b6f6;
      border-radius: 50%;
      animation: pulse .75s infinite alternate;
    }

    .inside-arrow.top { top: 63px; }
    .inside-arrow.bottom { bottom: 64px; }

    @keyframes pulse {
      from { transform: scale(.9); opacity: .7; }
      to { transform: scale(1.08); opacity: 1; }
    }

    .inside-brush {
      position: absolute;
      font-size: 48px;
      left: 112px;
      animation: smallScrub .65s infinite alternate;
      z-index: 10;
    }

    .inside-brush.top { top: 72px; }
    .inside-brush.bottom { bottom: 70px; }

    @keyframes smallScrub {
      from { transform: translateX(-30px) rotate(-12deg); }
      to { transform: translateX(38px) rotate(14deg); }
    }

    .chew-map {
      width: 325px;
      margin: 0 auto;
      background: #e8f5e9;
      border: 6px solid #43a047;
      border-radius: 30px;
      padding: 12px;
      position: relative;
    }

    .mouth-icon {
      font-size: 44px;
      margin-bottom: 4px;
    }

    .chew-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .corner {
      min-height: 110px;
      background: white;
      border: 5px dashed #ff9800;
      border-radius: 22px;
      padding: 8px;
      position: relative;
      opacity: .42;
      transition: .25s;
    }

    .corner.active {
      opacity: 1;
      background: #fff8e1;
      transform: scale(1.06);
      box-shadow: 0 0 18px #ffb74d;
    }

    .corner-symbol {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .flat-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .flat {
      width: 34px;
      height: 34px;
      border: 5px solid #ff9800;
      border-radius: 12px;
      background: #fffde7;
      box-shadow: inset 0 -5px 0 #ffe0b2;
    }

    .corner.active .flat {
      background: #fff176;
      box-shadow: 0 0 14px #ffca28;
    }

    .chew-brush {
      position: absolute;
      bottom: 2px;
      left: 32%;
      font-size: 39px;
      animation: chewScrub .55s infinite alternate;
    }

    @keyframes chewScrub {
      from { transform: translateX(-14px) rotate(-15deg); }
      to { transform: translateX(25px) rotate(15deg); }
    }

    .caption {
      background: #e1f5fe;
      color: #01579b;
      border-radius: 20px;
      padding: 11px;
      margin: 10px 0;
      min-height: 55px;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-wrap {
      width: 100%;
      height: 22px;
      background: #eceff1;
      border-radius: 999px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.15);
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #66bb6a, #29b6f6, #ab47bc, #ff7043);
      transition: width .5s linear;
    }

    .buttons {
      margin-top: 11px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 13px 8px;
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,.18);
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .start { background: #43a047; }
    .pause { background: #fb8c00; }
    .reset { background: #e53935; }
    .voice { background: #5e35b1; }

    .note {
      margin-top: 8px;
      font-size: 13px;
      color: #546e7a;
      font-weight: bold;
    }

    .celebrate {
      display: none;
      margin-top: 12px;
      background: #dcedc8;
      color: #33691e;
      padding: 14px;
      border-radius: 22px;
      font-size: 22px;
      font-weight: bold;
    }

    @media (max-width: 390px) {
      h1 { font-size: 24px; }
      .timer { font-size: 44px; }
      .stage { min-height: 295px; }
      .outside-mouth, .inside-mouth { width: 285px; }
      .chew-map { width: 288px; }
      .tooth { width: 24px; height: 34px; }
      .molar { width: 29px; }
      .flat { width: 28px; height: 30px; }
      .caption { font-size: 18px; }
      .top-badge, .bottom-badge { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">🪥😄🦷</div>
    <h1>Brush Buddy</h1>

    <div class="timer-card">
      <div id="timer" class="timer">02:00</div>
      <div id="bigEmoji" class="big-emoji">👆🦷</div>
    </div>

    <div class="stage">
      <div id="topView" class="view">
        <div class="symbol-row">👆🦷🦷🦷</div>
        <div class="outside-mouth">
          <div class="top-badge">TOP</div>
          <div class="brush top-brush">🪥</div>
          <div class="teeth-row top-row">
            <div class="tooth molar top-tooth"></div><div class="tooth molar top-tooth"></div>
            <div class="tooth top-tooth"></div><div class="tooth top-tooth"></div>
            <div class="tooth molar top-tooth"></div><div class="tooth molar top-tooth"></div>
          </div>
          <div class="teeth-row bottom-row">
            <div class="tooth molar dim-tooth"></div><div class="tooth molar dim-tooth"></div>
            <div class="tooth dim-tooth"></div><div class="tooth dim-tooth"></div>
            <div class="tooth molar dim-tooth"></div><div class="tooth molar dim-tooth"></div>
          </div>
        </div>
      </div>

      <div id="bottomView" class="view">
        <div class="symbol-row">👇🦷🦷🦷</div>
        <div class="outside-mouth">
          <div class="teeth-row top-row">
            <div class="tooth molar dim-tooth"></div><div class="tooth molar dim-tooth"></div>
            <div class="tooth dim-tooth"></div><div class="tooth dim-tooth"></div>
            <div class="tooth molar dim-tooth"></div><div class="tooth molar dim-tooth"></div>
          </div>
          <div class="teeth-row bottom-row">
            <div class="tooth molar bottom-tooth"></div><div class="tooth molar bottom-tooth"></div>
            <div class="tooth bottom-tooth"></div><div class="tooth bottom-tooth"></div>
            <div class="tooth molar bottom-tooth"></div><div class="tooth molar bottom-tooth"></div>
          </div>
          <div class="brush bottom-brush">🪥</div>
          <div class="bottom-badge">BOTTOM</div>
        </div>
      </div>

      <div id="insideTopView" class="view">
        <div class="symbol-row">🦁👆✨</div>
        <div class="inside-mouth">
          <div class="inside-arc top">
            <div class="inside-tooth top-inside"></div><div class="inside-tooth top-inside"></div>
            <div class="inside-tooth top-inside"></div><div class="inside-tooth top-inside"></div>
            <div class="inside-tooth top-inside"></div>
          </div>
          <div class="inside-arrow top"></div>
          <div class="inside-brush top">🪥</div>
          <div class="tongue"></div>
          <div class="inside-arc bottom">
            <div class="inside-tooth dim-tooth"></div><div class="inside-tooth dim-tooth"></div>
            <div class="inside-tooth dim-tooth"></div><div class="inside-tooth dim-tooth"></div>
            <div class="inside-tooth dim-tooth"></div>
          </div>
        </div>
      </div>

      <div id="insideBottomView" class="view">
        <div class="symbol-row">🦁👇✨</div>
        <div class="inside-mouth">
          <div class="inside-arc top">
            <div class="inside-tooth dim-tooth"></div><div class="inside-tooth dim-tooth"></div>
            <div class="inside-tooth dim-tooth"></div><div class="inside-tooth dim-tooth"></div>
            <div class="inside-tooth dim-tooth"></div>
          </div>
          <div class="tongue"></div>
          <div class="inside-arrow bottom"></div>
          <div class="inside-brush bottom">🪥</div>
          <div class="inside-arc bottom">
            <div class="inside-tooth bottom-inside"></div><div class="inside-tooth bottom-inside"></div>
            <div class="inside-tooth bottom-inside"></div><div class="inside-tooth bottom-inside"></div>
            <div class="inside-tooth bottom-inside"></div>
          </div>
        </div>
      </div>

      <div id="chewView" class="view">
        <div class="mouth-icon">😬</div>
        <div class="chew-map">
          <div class="chew-grid">
            <div id="top-left" class="corner">
              <div class="corner-symbol">↖️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="top-right" class="corner">
              <div class="corner-symbol">↗️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="bottom-left" class="corner">
              <div class="corner-symbol">↙️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
            <div id="bottom-right" class="corner">
              <div class="corner-symbol">↘️</div>
              <div class="flat-row"><div class="flat"></div><div class="flat"></div></div>
              <div class="chew-brush">🪥</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="caption" class="caption">Tap ▶ Start</div>

    <div class="progress-wrap">
      <div id="progress" class="progress"></div>
    </div>

    <div class="buttons">
      <button class="start" onclick="startTimer()">▶ Start</button>
      <button class="pause" onclick="pauseTimer()">⏸ Pause</button>
      <button class="reset" onclick="resetTimer()">↺ Reset</button>
      <button class="voice" onclick="testVoice()">🔊 Voice</button>
    </div>

    <div class="note">Pictures guide the child. Voice explains everything.</div>

    <div id="celebrate" class="celebrate">
      🎉 😁 ⭐ 🦷 ⭐ 😁 🎉
    </div>
  </div>

  <script>
    const totalTime = 120;
    let timeLeft = totalTime;
    let interval = null;
    let running = false;
    let currentSpeechIndex = -1;

    const timerEl = document.getElementById("timer");
    const bigEmojiEl = document.getElementById("bigEmoji");
    const captionEl = document.getElementById("caption");
    const progressEl = document.getElementById("progress");
    const celebrateEl = document.getElementById("celebrate");

    const views = {
      top: document.getElementById("topView"),
      bottom: document.getElementById("bottomView"),
      insideTop: document.getElementById("insideTopView"),
      insideBottom: document.getElementById("insideBottomView"),
      chew: document.getElementById("chewView")
    };

    const speechPlan = [
      { at:120, view:"top", emoji:"👆🦷", caption:"👆🦷✨", text:"Start with the top teeth. Brush the yellow teeth. Tiny circles." },
      { at:114, view:"top", emoji:"🚂👆", caption:"🚂 ↔️", text:"Chugga chugga toothbrush train on the top teeth." },
      { at:108, view:"top", emoji:"⬅️➡️", caption:"⬅️🪥➡️", text:"Go side to side. Left and right. Nice and gentle." },
      { at:102, view:"top", emoji:"⭐👆", caption:"⭐🦷⭐", text:"Top teeth are getting shiny. Keep going, brushing buddy." },

      { at:96, view:"bottom", emoji:"👇🦷", caption:"👇🦷✨", text:"Now bottom teeth. Brush the yellow bottom teeth." },
      { at:90, view:"bottom", emoji:"🐢👇", caption:"🐢 slow", text:"Go slow like a turtle. No rushing, only gentle brushing." },
      { at:84, view:"bottom", emoji:"⬅️➡️", caption:"⬅️🪥➡️", text:"Brush left, middle, and right on the bottom teeth." },
      { at:78, view:"bottom", emoji:"😄👇", caption:"😁✨", text:"Bottom teeth are smiling. Bye bye sugar bugs." },

      { at:72, view:"insideTop", emoji:"🦁👆", caption:"🦁 👆", text:"Open big like a lion. Brush behind the top teeth." },
      { at:66, view:"insideTop", emoji:"🔎👆", caption:"🔎🦷", text:"Look behind the top teeth. Sneaky crumbs hide there." },
      { at:60, view:"insideTop", emoji:"✨👆", caption:"🪥✨", text:"Wiggle the brush behind the top teeth. Sparkle sparkle." },
      { at:54, view:"insideTop", emoji:"👋🐛", caption:"👋🐛", text:"Say bye bye sugar bugs behind the top teeth." },

      { at:48, view:"insideBottom", emoji:"🦁👇", caption:"🦁 👇", text:"Now behind the bottom teeth. Open wide again." },
      { at:42, view:"insideBottom", emoji:"🔎👇", caption:"🔎🦷", text:"Brush behind the bottom teeth. Tiny gentle circles." },
      { at:36, view:"insideBottom", emoji:"✨👇", caption:"🪥✨", text:"Clean the middle too. Do not let crumbs play hide and seek." },

      { at:30, view:"chew", emoji:"↖️🦷", corner:"top-left", caption:"↖️🪥", text:"Chewing teeth time. Top left corner. Scrub the flat teeth." },
      { at:24, view:"chew", emoji:"↗️🦷", corner:"top-right", caption:"↗️🪥", text:"Top right corner. Scrub scrub like a tiny race car." },
      { at:18, view:"chew", emoji:"↙️🦷", corner:"bottom-left", caption:"↙️🪥", text:"Bottom left corner. These teeth chew snacks, clean the flat tops." },
      { at:12, view:"chew", emoji:"↘️🦷", corner:"bottom-right", caption:"↘️🪥", text:"Bottom right corner. Last tooth corner, champion." },
      { at:6, view:"chew", emoji:"👅✨", corner:"bottom-right", caption:"👅✨", text:"Final sparkle. Gently brush your tongue. Almost done." },
      { at:1, view:"chew", emoji:"🎉😁", corner:"bottom-right", caption:"🎉😁", text:"Three, two, one. Tooth party complete." }
    ];

    function loadVoices() {
      if ("speechSynthesis" in window) window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("Voice is not supported in this browser.");
        return;
      }

      window.speechSynthesis.cancel();

      const voices = window.speechSynthesis.getVoices();
      const voice =
        voices.find(v => v.name.toLowerCase().includes("samantha")) ||
        voices.find(v => v.name.toLowerCase().includes("google us english")) ||
        voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en-us")) ||
        voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) ||
        voices[0];

      const msg = new SpeechSynthesisUtterance(text);
      if (voice) msg.voice = voice;
      msg.lang = "en-US";
      msg.rate = 0.78;
      msg.pitch = 1.25;
      msg.volume = 1;
      window.speechSynthesis.speak(msg);
    }

    function testVoice() {
      loadVoices();
      speak("Hi brushing buddy. Follow the pictures and I will guide you.");
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
    }

    function getCurrentStep() {
      let step = speechPlan[0];
      let index = 0;
      for (let i = 0; i < speechPlan.length; i++) {
        if (timeLeft <= speechPlan[i].at) {
          step = speechPlan[i];
          index = i;
        }
      }
      return { step, index };
    }

    function clearVisuals() {
      Object.values(views).forEach(v => v.classList.remove("show"));
      document.querySelectorAll(".active-tooth").forEach(el => el.classList.remove("active-tooth"));
      document.querySelectorAll(".glow").forEach(el => el.classList.remove("glow"));
      document.querySelectorAll(".corner").forEach(el => el.classList.remove("active"));
    }

    function showStep(step) {
      clearVisuals();
      views[step.view].classList.add("show");

      if (step.view === "top") {
        document.querySelectorAll(".top-tooth").forEach(t => t.classList.add("active-tooth"));
      }

      if (step.view === "bottom") {
        document.querySelectorAll(".bottom-tooth").forEach(t => t.classList.add("active-tooth"));
      }

      if (step.view === "insideTop") {
        document.querySelectorAll(".top-inside").forEach(t => t.classList.add("glow"));
      }

      if (step.view === "insideBottom") {
        document.querySelectorAll(".bottom-inside").forEach(t => t.classList.add("glow"));
      }

      if (step.view === "chew" && step.corner) {
        const cornerEl = document.getElementById(step.corner);
        if (cornerEl) cornerEl.classList.add("active");
      }

      bigEmojiEl.textContent = step.emoji;
      captionEl.textContent = step.caption;
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(timeLeft);
      progressEl.style.width = ((totalTime - timeLeft) / totalTime * 100) + "%";

      const { step, index } = getCurrentStep();
      showStep(step);

      if (running && index !== currentSpeechIndex) {
        currentSpeechIndex = index;
        speak(step.text);
      }
    }

    function startTimer() {
      loadVoices();
      if (running) return;

      running = true;
      celebrateEl.style.display = "none";

      const { step, index } = getCurrentStep();
      currentSpeechIndex = index;
      showStep(step);
      speak("Ready, set, brush. " + step.text);

      interval = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) finishTimer();
      }, 1000);
    }

    function pauseTimer() {
      running = false;
      clearInterval(interval);
      speak("Paused. Toothbrush is taking a tiny nap.");
    }

    function resetTimer() {
      running = false;
      clearInterval(interval);
      timeLeft = totalTime;
      currentSpeechIndex = -1;
      celebrateEl.style.display = "none";
      progressEl.style.width = "0%";
      timerEl.textContent = "02:00";
      bigEmojiEl.textContent = "👆🦷";
      captionEl.textContent = "Tap ▶ Start";
      clearVisuals();
      views.top.classList.add("show");
      document.querySelectorAll(".top-tooth").forEach(t => t.classList.add("active-tooth"));

      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function finishTimer() {
      running = false;
      clearInterval(interval);
      timeLeft = 0;
      progressEl.style.width = "100%";
      bigEmojiEl.textContent = "🎉😁";
      captionEl.textContent = "🎉⭐😁⭐🎉";
      celebrateEl.style.display = "block";
      speak("All done. Great brushing. You defeated the sugar bugs. Big shiny smile.");
    }

    resetTimer();
  </script>
</body>
</html>
